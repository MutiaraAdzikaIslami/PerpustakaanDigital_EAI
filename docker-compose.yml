services:
  # 1. Database PostgreSQL 
  postgres_db:
    image: postgres:15-alpine
    container_name: iae_postgres_katalog
    restart: always
    environment:
      POSTGRES_USER: postgresuser
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: db_katalog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Hasura GraphQL Engine yang otomatis connect ke PostgreSQL 
  hasura_engine:
    image: hasura/graphql-engine:v2.38.0
    container_name: iae_hasura_katalog
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres_db
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgresuser:postgrespassword@postgres_db:5432/db_katalog
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: rahasiahasura

  # 3. Message Broker (Redis) untuk komunikasi antar service 
  message_broker:
    image: redis:7-alpine
    container_name: iae_redis_broker
    restart: always
    ports:
      - "6379:6379"

# 4. Database MySQL Bersama (Untuk Service Loan & Bookcopy)
  mysql_db:
    image: mysql:8.0
    container_name: iae_mysql_shared
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root  
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d  

  # 5. Service Peminjaman (Mutiara )
  iae-loan-service:
    build:
      context: ./iae-loan-service
      dockerfile: Dockerfile
    container_name: iae_loan_service
    ports:
      - "8000:8000"
    volumes:
      - ./iae-loan-service:/var/www
    depends_on:
      - mysql_db
      - message_broker

  # 6. Service Stok Buku (Alma)
  iae-bookcopy-service:
    build:
      context: ./iae-bookcopy-service
      dockerfile: Dockerfile
    container_name: iae_bookcopy_service
    ports:
      - "8001:8000"
    volumes:
      - ./iae-bookcopy-service:/var/www
    depends_on:
      - mysql_db
      - message_broker

volumes:
  pgdata:
  mysqldata: